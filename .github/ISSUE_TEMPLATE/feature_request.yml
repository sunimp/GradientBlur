name: 功能请求 / Feature request
description: 提议新功能或 API 扩展
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        描述你希望组件新增什么能力。Issue 标题请用动宾结构，如 "支持水平方向的渐变模糊"。
  - type: textarea
    id: problem
    attributes:
      label: 要解决的问题
      description: 这个功能解决什么场景下的什么痛点？
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 如果有想法，描述你期望的 API 形状或实现思路
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
      description: 现有 API 是否已经能绕过？绕过有什么代价？
    validations:
      required: false
  - type: dropdown
    id: contribute
    attributes:
      label: 你愿意提 PR 吗？
      options:
        - 愿意，需要维护者给方向
        - 愿意，有把握直接提 PR
        - 不确定
        - 不方便
    validations:
      required: false
